companions:
  - id: aim-browser-suite
    type: companion
    description: Headed Chromium CDP engine + browser skill suite
    repo: https://github.com/BrianV1981/aim-browser
    install: "cd aim-browser && npm run install-skills -- <dest> --mode symlink"
    status: active

  - id: aim-google
    type: companion
    description: Google Workspace CLI skill (Gmail/Drive/Calendar/…)
    repo: https://github.com/BrianV1981/aim-google
    install: "clone repo; link agent-skill/aim-google into vessel skills dir"
    status: active

  - id: aim-flight-recorder
    type: companion
    description: Forensic Markdown session extractor
    repo: https://github.com/BrianV1981/aim-flight-recorder
    status: active

  - id: aim-coagents
